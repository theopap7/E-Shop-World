<nav 
  class="breadcrumb" 
  *ngIf="breadcrumbs.length > 0 && showBreadcrumbs"
  aria-label="breadcrumb">
  
  <ol class="breadcrumb-list">
    
    <li 
      *ngFor="let crumb of breadcrumbs; let last = last"
      class="breadcrumb-item"
      [class.active]="crumb.active">
      
      <!-- Link (for non-active breadcrumbs) -->
      <a 
        *ngIf="!crumb.active"
        [routerLink]="crumb.url"
        class="breadcrumb-link">
        {{ crumb.label }}
      </a>
      
      <!-- Text (for active/current breadcrumb) -->
      <span 
        *ngIf="crumb.active"
        class="breadcrumb-text">
        {{ crumb.label }}
      </span>
      
      <!-- Separator (not for last item) -->
      <span 
        *ngIf="!last"
        class="breadcrumb-separator"
        aria-hidden="true">
        /
      </span>
      
    </li>
    
  </ol>
  
</nav>
