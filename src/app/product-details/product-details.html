<section class="page">
  <div class="container">



    <!-- Back button -->
    <a routerLink="/dashboard" class="back-button">
      <span class="back-icon">←</span>
      <span>Πίσω στο κατάστημα</span>
    </a>

    <!-- ✅ LOADING SKELETON -->
    <div *ngIf="isLoading" class="product-detail-skeleton">
      <div class="skeleton-layout">

        <!-- Image Skeleton -->
        <div class="skeleton-image-section">
          <app-skeleton type="image" height="400px"></app-skeleton>
        </div>

        <!-- Info Skeleton -->
        <div class="skeleton-info-section">
          <app-skeleton type="title" width="300px"></app-skeleton>

          <div style="margin-top:10px">
            <app-skeleton type="text" width="120px"></app-skeleton>
          </div>

          <div style="margin-top:20px">
           <app-skeleton type="text" [count]="3"></app-skeleton>
          </div>

          <div style="margin-top:20px">
            <app-skeleton type="image" height="48px" width="180px"></app-skeleton>
          </div>
        </div>

      </div>
    </div>

    <!-- Error state -->
    <div *ngIf="!isLoading && error" class="error-card">
      <p>{{ error }}</p>
    </div>

    <!-- ✅ REAL PRODUCT -->
    <div *ngIf="!isLoading && !error && product" class="product-detail">

      <!-- Left: Image Gallery -->
      <div class="product-image-wrap">
        <img
          [src]="(activeImageUrl || product.image_url) | imageUrl"
          [alt]="product.name"
          class="product-image"
          (error)="$any($event.target).src='no-image.svg'"
        />

        <div class="gallery-thumbs" *ngIf="galleryImages.length > 0">
          <button
            class="thumb-btn"
            type="button"
            [class.active]="activeImageUrl === product.image_url"
            (click)="activeImageUrl = product.image_url">
            <img [src]="product.image_url | imageUrl" [alt]="product.name" (error)="$any($event.target).src='no-image.svg'" />
          </button>
          <button
            *ngFor="let img of galleryImages"
            class="thumb-btn"
            type="button"
            [class.active]="activeImageUrl === img.image_url"
            (click)="activeImageUrl = img.image_url">
            <img [src]="img.image_url | imageUrl" [alt]="product.name" (error)="$any($event.target).src='no-image.svg'" />
          </button>
        </div>
      </div>

      <!-- Right: Info -->
      <div class="product-info">

        <span class="badge">
          {{ product.category_name || 'Χωρίς κατηγορία' }}
        </span>

        <h1 class="product-name">{{ product.name }}</h1>

        <div class="product-price">
          {{ product.price | number:'1.2-2' }}€
        </div>

        <div class="stock-status">
          <span *ngIf="product.stock > 0" class="in-stock">
            ✅ Διαθέσιμο ({{ product.stock }} τεμάχια)
          </span>

          <span *ngIf="product.stock === 0" class="out-of-stock">
            ❌ Εξαντλήθηκε
          </span>
        </div>

        <p class="product-description">
          {{ product.description || 'Δεν υπάρχει περιγραφή.' }}
        </p>

        <!-- Size selector (only for clothing) -->
        <div class="size-selector" *ngIf="sizes.length > 0">
          <label class="size-label">
            Μέγεθος
            <span *ngIf="!selectedSize" class="size-hint">— επιλέξτε</span>
          </label>
          <div class="size-buttons">
            <button
              *ngFor="let s of sizes"
              type="button"
              class="size-btn"
              [class.selected]="selectedSize === s"
              (click)="selectedSize = s">
              {{ s }}
            </button>
          </div>
        </div>

        <div class="product-actions">
          <div class="qty-selector" *ngIf="product.stock > 0">
            <label class="qty-label">Ποσότητα</label>
            <select class="qty-select" [(ngModel)]="selectedQty">
              <option *ngFor="let n of qtyOptions" [value]="n">{{ n }}</option>
            </select>
          </div>

          <button
            class="btn btn-primary btn-large"
            type="button"
            (click)="addToCart()"
            [disabled]="!canAddToCart || addedToCart">
            {{ addedToCart ? '✅ Προστέθηκε!' : 'Προσθήκη στο καλάθι' }}
          </button>

          <button
            class="btn-wishlist"
            type="button"
            (click)="toggleWishlist()"
            [class.in-wishlist]="isInWishlist()"
            [title]="isInWishlist() ? 'Αφαίρεση από αγαπημένα' : 'Προσθήκη στα αγαπημένα'">
            {{ isInWishlist() ? '❤️' : '🤍' }}
          </button>
        </div>

      </div>

    </div>

    <!-- Reviews -->
    <app-reviews
      *ngIf="!isLoading && product"
      [productId]="product.id">
    </app-reviews>

  </div>
</section>
