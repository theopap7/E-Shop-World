<div class="login-container">
  <h2>Σύνδεση Χρήστη</h2>
  <form (ngSubmit)="onSubmit()" [formGroup]="loginForm">
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" formControlName="email" type="email"  />
      <div *ngIf="loginForm.controls['email'].invalid && loginForm.controls['email'].touched">
        <small class="error" *ngIf="loginForm.controls['email'].hasError('required')">Το email είναι υποχρεωτικό.</small>
        <small class="error" *ngIf="loginForm.controls['email'].hasError('email')">Πληκτρολογήστε ένα έγκυρο email.</small>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Κωδικός</label>
      <input id="password" formControlName="password" type="password" />
      <div *ngIf="loginForm.controls['password'].invalid && loginForm.controls['password'].touched">
        <small class="error" *ngIf="loginForm.controls['password'].hasError('required')">Ο κωδικός είναι υποχρεωτικός.</small>
        <small class="error" *ngIf="loginForm.controls['password'].hasError('minlength')">Ο κωδικός πρέπει να έχει τουλάχιστον 6 χαρακτήρες.</small>
      </div>
    </div>

    <button type="submit" [disabled]="!loginForm.valid">Σύνδεση</button>
  </form>
  <p>
    Δεν έχεις λογαριασμό; <a routerLink="/register">Εγγραφή</a>
  </p>
</div>
