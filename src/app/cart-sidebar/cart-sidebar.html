<!-- Overlay (σκοτεινό background) -->
<div
  class="overlay"
  *ngIf="isOpen"
  (click)="close()">
</div>

<!-- Sidebar -->
<div class="sidebar" [class.open]="isOpen">

  <!-- Header -->
  <div class="sidebar-header">
    <h3>🛒 Καλάθι ({{ cartService.getCount() }})</h3>
    <div class="header-actions">
      <button *ngIf="items.length > 0" class="clear-btn" type="button" (click)="clearCart()">Αφαίρεση όλων</button>
      <button class="close-btn" type="button" (click)="close()">✕</button>
    </div>
  </div>

  <!-- Empty state -->
  <div *ngIf="items.length === 0" class="empty-cart">
    <p>🛒</p>
    <p>Το καλάθι σου είναι άδειο</p>
    <button class="btn btn-outline" type="button" (click)="close()">
      Συνέχεια αγορών
    </button>
  </div>

  <!-- Items -->
  <div class="sidebar-items" *ngIf="items.length > 0">
    <div class="cart-item" *ngFor="let item of items">
      <a [routerLink]="['/products', item.productId]" (click)="close()">
        <img
          class="item-thumb"
          [src]="item.image_url || 'no-image.svg'"
          [alt]="item.name"
          (error)="$any($event.target).src='no-image.svg'"
        />
      </a>
      <div class="item-body">
        <div class="item-top">
          <a class="item-name" [routerLink]="['/products', item.productId]" (click)="close()">{{ item.name }}</a>
          <div class="item-price">{{ item.price | number:'1.2-2' }}€</div>
        </div>
        <div *ngIf="item.size" class="item-size">Μέγεθος: {{ item.size }}</div>
        <div class="item-bottom">
          <div class="item-controls">
            <button class="qty-btn" type="button" (click)="decrease(item.productId, item.size)">−</button>
            <span class="qty">{{ item.quantity }}</span>
            <button class="qty-btn" type="button" (click)="increase(item.productId, item.size)">+</button>
            <button class="remove-btn" type="button" (click)="remove(item.productId, item.size)">🗑️</button>
          </div>
          <div class="item-subtotal">{{ (item.price * item.quantity) | number:'1.2-2' }}€</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="sidebar-footer" *ngIf="items.length > 0">
    <div class="total-row">
      <span>Σύνολο:</span>
      <strong>{{ total | number:'1.2-2' }}€</strong>
    </div>

    <button
      class="btn btn-primary checkout-btn"
      type="button"
      routerLink="/checkout"
      (click)="close()">
      Ολοκλήρωση αγοράς
    </button>

    <button
      class="btn btn-outline view-cart-btn"
      type="button"
      routerLink="/cart"
      (click)="close()">
      Προβολή Καλαθιού
    </button>
  </div>
</div>
